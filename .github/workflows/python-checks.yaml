name: Test and Lint Python code

on:
  pull_request:
    branches:
      - main
    paths:
      - "**.py"
      - "pyproject.toml"
      - "poetry.lock"
  # Allow manual triggering through GitHub
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]
    name: Python ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v1
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Install Dependencies
        run: poetry install

      - name: isort - check import formatting
        run: poetry run poe isort-check

      - name: Black - check code formatting
        run: poetry run poe black-check

      - name: pylint - static code analysis
        run: poetry run poe pylint-check

      - name: mypy - static type checking
        run: poetry run poe mypy-check

      - name: pytest - run the tests
        run: poetry run poe pytest-check
